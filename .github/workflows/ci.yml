name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  client:
    name: Client Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    env:
      VITE_API_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run lint if available
        run: npm run lint --if-present

      - name: Build client
        run: npm run build

  server:
    name: Server Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run lint if available
        run: npm run lint --if-present

      - name: Run server tests
        run: npm test --if-present